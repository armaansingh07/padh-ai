<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Padh.ai</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        tech: { 900: '#000000', 800: '#0a0a0c', 700: '#141417', accent: '#ffffff' }
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            background-color: #000000; 
            color: #f4f4f5; 
            overflow-x: hidden; 
        }
        
        /* Vibrant Background Glow Orbs */
        .glow-orb { 
            position: absolute; 
            border-radius: 50%; 
            filter: blur(140px); 
            z-index: -1; 
            opacity: 0.4; 
            animation: pulse-slow 8s infinite alternate;
        }
        /* Blue for email side, Green for phone side */
        .orb-1 { top: 10%; left: -10%; width: 45vw; height: 45vw; background: rgba(59, 130, 246, 0.2); }
        .orb-2 { bottom: 10%; right: -10%; width: 50vw; height: 50vw; background: rgba(34, 197, 94, 0.15); }

        @keyframes pulse-slow {
            0% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(1.1); opacity: 0.5; }
        }

        /* Scrollytelling Animation */
        .reveal { 
            opacity: 0; 
            filter: blur(10px);
            transform: translateY(40px) scale(0.98); 
            transition: all 1s cubic-bezier(0.22, 1, 0.36, 1); 
        }
        .reveal.active { 
            opacity: 1; 
            filter: blur(0px);
            transform: translateY(0) scale(1); 
        }

        /* Frosted Glass */
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .glass-card:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="relative min-h-screen antialiased selection:bg-blue-500 selection:text-white flex flex-col">

    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>

    <nav class="fixed w-full z-50 top-0 border-b border-white/[0.05] bg-black/50 backdrop-blur-xl supports-[backdrop-filter]:bg-black/30">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity">
                <i class="fas fa-layer-group text-blue-500 text-2xl drop-shadow-[0_0_10px_rgba(59,130,246,0.5)]"></i>
                <span class="font-bold tracking-tight text-xl text-white">Padh<span class="text-blue-500">.ai</span></span>
            </a>
            
            <div class="flex gap-2 sm:gap-4 items-center">
                <a href="index.html" class="text-sm font-semibold text-zinc-400 hover:text-white px-3 py-2 rounded-full transition-all duration-300 hover:bg-white/10 hidden sm:block">
                    Home
                </a>
                <a href="about.html" class="text-sm font-semibold text-zinc-400 hover:text-white px-3 py-2 rounded-full transition-all duration-300 hover:bg-white/10">
                    About
                </a>
                <a href="contact.html" class="text-sm font-semibold text-white bg-white/10 px-4 py-2 rounded-full transition-all duration-300 flex items-center gap-2 border border-white/10 shadow-lg shadow-black/20">
                    <i class="fas fa-envelope text-xs opacity-70"></i> Contact
                </a>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex flex-col justify-center pt-32 pb-20 px-6">
        
        <header class="mb-16 text-center reveal">
            <h1 class="text-5xl md:text-7xl font-black mb-4 tracking-tighter bg-clip-text text-transparent bg-gradient-to-br from-white via-zinc-200 to-zinc-600">
                Connect.
            </h1>
            <p class="text-zinc-500 text-lg">Drop a line. Or don't.</p>
        </header>

        <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8 w-full">
            
            <div class="glass-card p-10 rounded-[32px] text-center group reveal hover:border-blue-500/40 relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-b from-blue-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                <div class="relative z-10">
                    <div class="w-20 h-20 bg-blue-500/10 text-blue-400 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-6 border border-blue-500/20 group-hover:bg-blue-500 group-hover:text-white transition-all duration-500 shadow-[0_0_20px_rgba(59,130,246,0.2)]">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <h3 class="text-2xl font-bold mb-2 text-white">Email Me</h3>
                    <p class="text-zinc-400 mb-8 text-sm">For contributions or feedback</p>
                    <a href="mailto:25011a0308@jntuhceh.ac.in" class="inline-block px-6 py-3 rounded-full bg-blue-500/10 border border-blue-500/30 text-blue-400 font-bold text-sm md:text-base hover:bg-blue-500 hover:text-white transition-all duration-300">
                        25011a0308@jntuhceh.ac.in
                    </a>
                </div>
            </div>

            <div class="glass-card p-10 rounded-[32px] text-center group reveal hover:border-green-500/40 relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-b from-green-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                <div class="relative z-10">
                    <div class="w-20 h-20 bg-green-500/10 text-green-400 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-6 border border-green-500/20 group-hover:bg-green-500 group-hover:text-white transition-all duration-500 shadow-[0_0_20px_rgba(34,197,94,0.2)]">
                        <i class="fas fa-phone-alt"></i>
                    </div>
                    <h3 class="text-2xl font-bold mb-2 text-white">Phone</h3>
                    <p class="text-zinc-400 mb-8 text-sm">maintain silence fam</p>
                    <div class="inline-block px-6 py-3 rounded-full bg-white/5 border border-white/10 text-green-400 font-bold text-sm md:text-base cursor-not-allowed">
                        +91 (naw i aint dropping my number here)
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const reveals = document.querySelectorAll('.reveal');
            
            const revealOnScroll = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        observer.unobserve(entry.target);
                    }
                });
            }, {
                threshold: 0.1,
                rootMargin: "0px 0px -50px 0px"
            });

            reveals.forEach((element, index) => {
                element.style.transitionDelay = `${index * 0.15}s`;
                revealOnScroll.observe(element);
            });
        });
    </script>
</body>
</html>
